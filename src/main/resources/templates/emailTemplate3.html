<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${assunto}">Assunto do Email</title>
    <style>
        body {
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            background-color: #f1f3f4;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            background-color: #ffffff;
            max-width: 520px;
            margin: 40px auto;
            padding: 0;
            border-radius: 8px;
            border: 1px solid #dadce0;
            overflow: hidden;
        }
        .header {
            text-align: center;
            padding: 48px 40px 24px;
            border-bottom: 1px solid #e8eaed;
        }
        .logo img {
            height: 150px;
            max-width: 400px;
        }

        .content {
            padding: 40px 40px 32px;
        }
        h2 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin: 0 0 24px 0;
            line-height: 1.4;
        }
        p {
            font-size: 14px;
            color: #3c4043;
            line-height: 1.6;
            margin: 0 0 16px 0;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 24px 40px;
            text-align: center;
            font-size: 12px;
            color: #5f6368;
            border-top: 1px solid #e8eaed;
        }

        @media only screen and (max-width: 600px) {
            .container {
                margin: 20px 10px;
                border-radius: 0;
            }
            .header,
            .content,
            .footer {
                padding-left: 24px;
                padding-right: 24px;
            }
            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <img th:src="${logoUrl}" src="https://i.imgur.com/ebUmVMW.png" alt="Logo">
        </div>
    </div>

    <div class="content">
        <h2 th:text="${titulo}">Título do Email</h2>
        <p th:text="${mensagem}">Mensagem do corpo do email</p>
    </div>

    <div class="footer">
        <p>Enviado com Spring Boot 🚀</p>
    </div>
</div>
</body>
</html>
